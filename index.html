
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRAAT AI | Pure Audio Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Branding Palette */
            --brand-primary: #B2D900;
            --brand-on-primary: #000000;
            
            /* iOS 17 Dark Mode Palette Adjusted for Brand */
            --ios-bg: #000000;
            --ios-grouped-bg: #000000;
            --ios-card-bg: #1C1C1E;
            --ios-card-pressed: #2C2C2E;
            --ios-separator: #38383A;
            --ios-text: #FFFFFF;
            --ios-text-secondary: #8E8E93;
            
            /* Interaction Colors */
            --ios-blue: var(--brand-primary); /* Override standard blue with brand */
            --ios-green: #30D158;
            --ios-red: #FF453A;
            --ios-accent: var(--brand-primary);
            
            --ios-easing: cubic-bezier(0.25, 1, 0.5, 1);
        }

        body.session-active {
            --ios-bg: #000000;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        body { 
          font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif; 
          background-color: var(--ios-bg); 
          color: var(--ios-text); 
          margin: 0;
          padding: 0;
          overflow: hidden;
          height: 100dvh;
          width: 100vw;
        }

        #root {
          height: 100%;
          display: flex;
          flex-direction: column;
        }

        /* iOS-like Scrolling */
        .ios-scroll-container {
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            overscroll-behavior-y: contain;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* iOS Components */
        
        /* 1. Grouped Inset List */
        .ios-list-group {
            border-radius: 10px;
            background-color: var(--ios-card-bg);
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .ios-list-item {
            padding: 12px 16px;
            background-color: var(--ios-card-bg);
            border-bottom: 0.5px solid var(--ios-separator);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 44px;
            transition: background-color 0.2s ease;
        }
        
        .ios-list-item:last-child { border-bottom: none; }
        .ios-list-item:active { background-color: var(--ios-card-pressed); }

        /* 2. Cards (Shortcuts Style) */
        .ios-card {
            background-color: var(--ios-card-bg);
            border-radius: 16px;
            padding: 16px;
            position: relative;
            transition: transform 0.2s var(--ios-easing), background-color 0.2s ease;
        }
        .ios-card:active { transform: scale(0.96); background-color: var(--ios-card-pressed); }

        /* 3. Typography Hierarchy */
        .text-large-title { font-size: 34px; line-height: 41px; font-weight: 700; letter-spacing: 0.37px; }
        .text-title-1 { font-size: 28px; line-height: 34px; font-weight: 700; letter-spacing: 0.36px; }
        .text-title-2 { font-size: 22px; line-height: 28px; font-weight: 700; letter-spacing: 0.35px; }
        .text-title-3 { font-size: 20px; line-height: 25px; font-weight: 600; letter-spacing: 0.38px; }
        .text-headline { font-size: 17px; line-height: 22px; font-weight: 600; letter-spacing: -0.41px; }
        .text-body { font-size: 17px; line-height: 22px; font-weight: 400; letter-spacing: -0.41px; }
        .text-subhead { font-size: 15px; line-height: 20px; font-weight: 400; letter-spacing: -0.24px; }
        .text-caption-1 { font-size: 12px; line-height: 16px; font-weight: 400; letter-spacing: 0; }
        .text-caption-2 { font-size: 11px; line-height: 13px; font-weight: 400; letter-spacing: 0.06px; }

        /* Utilities */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 20px); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        
        .blur-header {
            background: rgba(0, 0, 0, 0.85); /* Slightly darker for better contrast */
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        /* Animations */
        .animate-in-up {
            animation: slideUp 0.6s var(--ios-easing) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .animate-in-fade {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
